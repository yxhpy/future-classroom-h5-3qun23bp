<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《龟兔赛跑》绘本剧场</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="presentation-container" class="theater-mode">
        <!-- 全局舞台幕布层 -->
        <div class="curtain-layer">
            <div class="curtain curtain-left"></div>
            <div class="curtain curtain-right"></div>
            <div class="curtain curtain-top"></div>
        </div>

        <div id="slides-wrapper">
            <!-- 第1页：封面 (大景、聚光灯、标题牌) -->
            <section class="slide active" id="slide-1">
                <div class="layer background">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="森林舞台">
                </div>
                <div class="layer midground cover-scene">
                    <div class="wooden-board title-board">
                        <h1 class="title">龟兔赛跑</h1>
                        <p class="subtitle">经典童话绘本剧场</p>
                    </div>
                    <div class="characters-preview">
                        <img src="assets/hare-proud.svg" class="hero hero-hare animate-bounce" alt="骄傲的兔子">
                        <img src="assets/tortoise-happy.svg" class="hero hero-tortoise animate-sway" alt="开心的乌龟">
                    </div>
                </div>
                <div class="layer foreground stage-effects">
                    <div class="spotlight-beam left-beam"></div>
                    <div class="spotlight-beam right-beam"></div>
                    <div class="css-sparkles">
                        <span class="sparkle s1"></span>
                        <span class="sparkle s2"></span>
                        <span class="sparkle s3"></span>
                    </div>
                </div>
            </section>

            <!-- 第2页：角色介绍 (左右分栏、主角登场打光) -->
            <section class="slide" id="slide-2">
                <div class="layer background blur-bg">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="森林舞台">
                </div>
                <div class="layer midground theater-layout">
                    <div class="narration-ribbon top">今天，舞台上来了两位大明星！</div>
                    <div class="character-showcase">
                        <div class="character-card pop-in">
                            <div class="card-spotlight"></div>
                            <img src="assets/hare-proud.svg" class="card-img" alt="骄傲的兔子">
                            <div class="name-tag hare-tag">飞毛腿</div>
                            <div class="bubble hare-bubble shake">“我可是森林里跑得最快的！”</div>
                        </div>
                        <div class="character-card pop-in delay-1">
                            <div class="card-spotlight"></div>
                            <img src="assets/tortoise-steady.svg" class="card-img" alt="稳重的乌龟">
                            <div class="name-tag tortoise-tag">慢吞吞</div>
                            <div class="bubble tortoise-bubble float">“我虽然慢，但我很踏实。”</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 第3页：挑战发起 (对峙构图、强光、景深) -->
            <section class="slide" id="slide-3">
                <div class="layer background parallax-deep">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="森林舞台">
                </div>
                <div class="layer midground dramatic-scene">
                    <div class="wooden-sign top-center">一场大比赛即将开始……</div>
                    <div class="dialogue-stage">
                        <div class="actor left-actor">
                            <div class="bubble dramatic shout">敢和我比跑步吗？小慢龟！</div>
                            <img src="assets/hare-proud.svg" class="char-left animate-lean" alt="兔子">
                        </div>
                        <div class="vs-badge pop-in delay-1">VS</div>
                        <div class="actor right-actor">
                            <div class="bubble calm firm delay-2">好啊，比就比！</div>
                            <img src="assets/tortoise-steady.svg" class="char-right animate-nod" alt="乌龟">
                        </div>
                    </div>
                </div>
                <div class="layer foreground tension-shadows"></div>
            </section>

            <!-- 第4页：比赛过程1 - 兔子领先 (斜向构图、速度线) -->
            <section class="slide" id="slide-4">
                <div class="layer background track-bg panning-bg">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="跑道">
                </div>
                <div class="layer midground race-track diagonal-layout">
                    <div class="narration-box bottom-left">比赛开始！兔子像风一样冲了出去。</div>
                    <div class="racer fast-racer">
                        <img src="assets/hare-proud.svg" class="moving-fast" alt="飞奔的兔子">
                        <div class="css-speed-lines"></div>
                        <div class="css-dust-cloud"></div>
                    </div>
                    <div class="racer slow-racer">
                        <img src="assets/tortoise-steady.svg" class="moving-slow" alt="慢慢爬的乌龟">
                        <div class="css-sweat-drops">
                            <span class="drop d1"></span><span class="drop d2"></span>
                        </div>
                    </div>
                </div>
                <div class="layer foreground audience-cheer">
                    <div class="cheer-signboard slide-in-bottom">观众：加油！加油！</div>
                </div>
            </section>

            <!-- 第5页：比赛过程2 - 兔子睡着 (近景、树荫、变暗) -->
            <section class="slide" id="slide-5">
                <div class="layer background night-lighting">
                    <img src="assets/forest-stage.svg" class="bg-image dimmed" alt="安静的森林">
                </div>
                <div class="layer midground close-up-scene">
                    <div class="narration-ribbon float-top">半路上，骄傲的兔子觉得太轻松了……</div>
                    <div class="tree-shade-container">
                        <div class="css-tree-trunk"></div>
                        <div class="sleeping-spot">
                            <img src="assets/hare-sleeping.svg" class="sleeping-hare animate-breathe" alt="睡觉的兔子">
                            <div class="bubble sleep-bubble">
                                <div class="zzz-marks">
                                    <span class="z1">Z</span><span class="z2">z</span><span class="z3">z</span>...
                                </div>
                                <div class="sleep-text">乌龟还早着呢，睡个午觉。</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layer foreground leaf-shadows overlay-dark"></div>
            </section>

            <!-- 第6页：冲刺反转 (透视构图、聚焦终点) -->
            <section class="slide" id="slide-6">
                <div class="layer background perspective-bg">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="终点前">
                </div>
                <div class="layer midground effort-scene">
                    <div class="narration-box top-left">可是，乌龟一步一步，稳稳地向前爬……</div>
                    <div class="approaching-track">
                        <img src="assets/finish-line.svg" class="finish-line-far" alt="远处的终点线">
                        <img src="assets/tortoise-steady.svg" class="approaching-tortoise animate-crawl" alt="努力的乌龟">
                    </div>
                </div>
                <div class="layer foreground focus-light">
                    <div class="cheer-signboard pop-in">观众：快到了！坚持住！</div>
                </div>
            </section>

            <!-- 第7页：结局 (合影视角、高光、落差感) -->
            <section class="slide" id="slide-7">
                <div class="layer background blur-bg">
                    <img src="assets/forest-stage.svg" class="bg-image" alt="赛后森林">
                </div>
                <div class="layer midground climax-scene">
                    <div class="narration-ribbon big-news drop-in">爆冷大结局！乌龟赢啦！</div>
                    <div class="celebration-stage">
                        <div class="winner-podium">
                            <img src="assets/finish-line.svg" class="bg-finish front-view" alt="终点">
                            <img src="assets/tortoise-happy.svg" class="winner animate-jump" alt="开心的乌龟">
                        </div>
                        <div class="loser-corner">
                            <div class="bubble panic-bubble explode">哎呀！我怎么睡过头了？！</div>
                            <img src="assets/hare-surprised.svg" class="shocked-hare animate-tremble" alt="震惊的兔子">
                        </div>
                    </div>
                </div>
                <div class="layer foreground css-confetti-layer">
                    <div class="confetti-piece c1"></div>
                    <div class="confetti-piece c2"></div>
                    <div class="confetti-piece c3"></div>
                    <div class="confetti-piece c4"></div>
                    <div class="confetti-piece c5"></div>
                </div>
            </section>

            <!-- 第8页：寓意页 (舞台谢幕、大木牌、聚光灯) -->
            <section class="slide" id="slide-8">
                <div class="layer background stage-dimmed">
                    <img src="assets/forest-stage.svg" class="bg-image very-dim" alt="落幕森林">
                </div>
                <div class="layer midground moral-board-scene">
                    <div class="center-spotlight"></div>
                    <div class="wooden-billboard large pop-in">
                        <h2 class="moral-title">故事告诉我们</h2>
                        <div class="lesson-text">
                            <p>骄傲使人落后，</p>
                            <p>虚心使人进步。</p>
                            <p class="highlight-text pulse-glow">坚持到底就是胜利！</p>
                        </div>
                        <img src="assets/tortoise-happy.svg" class="moral-mascot animate-nod" alt="乌龟开心">
                        <div class="applause-sign">谢谢观看</div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 播放控制UI (保持原有结构) -->
        <div id="ui-layer">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="controls">
                <button id="prev-btn" class="nav-btn" aria-label="上一页">◀</button>
                <div class="page-indicator"><span id="current-page">1</span> / <span id="total-pages">8</span></div>
                <button id="next-btn" class="nav-btn" aria-label="下一页">▶</button>
                <button id="fullscreen-btn" class="icon-btn" aria-label="全屏">⛶</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
