<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 250'>
  <defs>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='5' stdDeviation='5' flood-opacity='0.15'/>
    </filter>
  </defs>
  <g filter='url(#shadow)'>
    <!-- Body/Suit -->
    <path d='M60 110 Q100 90 140 110 L150 240 L50 240 Z' fill='#1a365d'/>
    <!-- Collar/Shirt -->
    <path d='M85 105 L100 130 L115 105 Z' fill='#ffffff'/>
    <path d='M97 125 L100 150 L103 125 Z' fill='#ed8936'/>
    <!-- Neck -->
    <rect x='90' y='90' width='20' height='20' fill='#fcd5ce'/>
    <!-- Head -->
    <circle cx='100' cy='65' r='35' fill='#fcd5ce'/>
    <!-- Hair -->
    <path d='M60 65 Q60 20 100 25 Q140 20 140 65 Q135 45 100 40 Q65 45 60 65 Z' fill='#2d3748'/>
    <path d='M62 60 L75 40 L85 45' fill='#2d3748'/>
    <!-- Glasses -->
    <circle cx='85' cy='60' r='10' fill='none' stroke='#319795' stroke-width='3'/>
    <circle cx='115' cy='60' r='10' fill='none' stroke='#319795' stroke-width='3'/>
    <line x1='95' y1='60' x2='105' y2='60' stroke='#319795' stroke-width='3'/>
    <!-- Eyes -->
    <circle cx='85' cy='60' r='3' fill='#2d3748'/>
    <circle cx='115' cy='60' r='3' fill='#2d3748'/>
    <!-- Smile -->
    <path d='M90 80 Q100 90 110 80' fill='none' stroke='#2d3748' stroke-width='2' stroke-linecap='round'/>
    <!-- Arm Left with Pointer -->
    <path d='M60 120 Q40 160 55 190' fill='none' stroke='#1a365d' stroke-width='18' stroke-linecap='round'/>
    <circle cx='55' cy='190' r='9' fill='#fcd5ce'/>
    <line x1='55' y1='190' x2='30' y2='130' stroke='#ed8936' stroke-width='4' stroke-linecap='round'/>
    <!-- Arm Right -->
    <path d='M140 120 Q160 160 145 200' fill='none' stroke='#1a365d' stroke-width='18' stroke-linecap='round'/>
    <circle cx='145' cy='200' r='9' fill='#fcd5ce'/>
  </g>
</svg>