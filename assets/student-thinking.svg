    <path d='M135 130 Q150 160 145 200' fill='none' stroke='#319795' stroke-width='16' stroke-linecap='round'/>
    <circle cx='145' cy='200' r='9' fill='#fcd5ce'/>
    <!-- Question Bubble -->
    <path d='M140 30 Q170 10 185 30 Q200 55 175 75 Q160 85 145 70 L135 30 Z' fill='#ffffff' stroke='#ed8936' stroke-width='3'/>
    <text x='155' y='60' font-family='sans-serif' font-weight='bold' font-size='24' fill='#ed8936'>?</text>
  </g>
</svg>