    <rect x='90' y='95' width='20' height='20' fill='#fcd5ce'/>
    <!-- Head -->
    <circle cx='100' cy='70' r='35' fill='#fcd5ce'/>
    <!-- Hair -->
    <path d='M65 70 Q60 25 105 25 Q135 25 135 70 Q125 50 100 50 Q75 50 65 70 Z' fill='#2c5282'/>
    <path d='M100 25 Q110 10 115 25' fill='none' stroke='#2c5282' stroke-width='4' stroke-linecap='round'/>
    <!-- Eyes Looking Up Left -->
    <circle cx='85' cy='65' r='8' fill='#ffffff'/>
    <circle cx='82' cy='63' r='4' fill='#2d3748'/>
    <circle cx='115' cy='65' r='8' fill='#ffffff'/>
    <circle cx='112' cy='63' r='4' fill='#2d3748'/>
    <!-- Thinking Mouth -->
    <path d='M93 85 Q97 82 100 85' fill='none' stroke='#2d3748' stroke-width='2' stroke-linecap='round'/>
    <!-- Arm Hand on Chin -->
    <path d='M65 130 Q40 160 70 180 Q85 180 85 95' fill='none' stroke='#319795' stroke-width='16' stroke-linecap='round'/>
    <circle cx='85' cy='95' r='9' fill='#fcd5ce'/>
