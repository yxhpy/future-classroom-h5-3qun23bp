<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 250'>
  <defs>
    <filter id='shadow-thk' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='5' stdDeviation='5' flood-opacity='0.15'/>
    </filter>
  </defs>
  <g filter='url(#shadow-thk)'>
    <!-- Body/Shirt -->
    <path d='M65 120 Q100 110 135 120 L140 240 L60 240 Z' fill='#319795'/>
    <!-- Collar -->
    <path d='M85 117 L100 135 L115 117 Z' fill='#e6fffa'/>
